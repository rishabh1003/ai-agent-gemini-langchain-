spring.application.name=ai-agent-gemini
server.port=8080

# LangChain4j Google Gemini Configuration
langchain4j.google-ai.gemini.chat-model.api-key=
langchain4j.google-ai.gemini.chat-model.model-name=gemini-2.0-flash
langchain4j.google-ai.gemini.chat-model.temperature=0.7
langchain4j.google-ai.gemini.chat-model.log-requests-and-responses=true


# 3. Vector DB Configuration (Connecting to pgvector)
spring.vectordb.datasource.url=jdbc:postgresql://localhost:5432/hr_database
spring.vectordb.datasource.username=hr_admin
spring.vectordb.datasource.password=hr_password

# ==========================================
# 1. DATABASE CONNECTION PROPERTIES
# ==========================================
# The JDBC URL pointing to your database. (Use 5433 if you changed the Docker port to avoid conflicts)
spring.datasource.url=jdbc:postgresql://localhost:5432/hr_database
spring.datasource.username=hr_admin
spring.datasource.password=hr_password
# The PostgreSQL driver class name
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# 2. HIKARI CONNECTION POOL CONFIGURATION (Optional but Recommended)
# ==========================================
# Maximum number of actual connections to the database in the pool
spring.datasource.hikari.maximum-pool-size=10
# Minimum number of idle connections that HikariCP tries to maintain
spring.datasource.hikari.minimum-idle=2
# Maximum time (in milliseconds) that a connection can sit idle in the pool
spring.datasource.hikari.idle-timeout=30000

# ==========================================
# 3. JPA / HIBERNATE PROPERTIES
# ==========================================
# The SQL dialect so Hibernate knows how to write Postgres-specific SQL queries
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# DDL Auto: Controls how database tables are managed on application startup.
# 'update': Hibernate will automatically create or update tables based on your @Entity classes.
spring.jpa.hibernate.ddl-auto=update

# SQL Logging: Highly useful for debugging. It prints every SQL statement to your console.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true